#!/usr/bin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        iif "lo" accept
        ct state established,related accept

        # ICMP
        meta l4proto { icmp, ipv6-icmp } accept

        # WireGuard: only port exposed to the internet
        iif "enp1s0" udp dport 51820 accept

        # SSH: LAN only
        iif "enp1s0" ip saddr 192.168.1.0/24 tcp dport 22 accept

        # Allow everything from WireGuard (SSH, Nginx, etc.)
        iif "wg0" accept
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}
