user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections  512;
}

http {
    sendfile  on;
    tcp_nopush  on;
    keepalive_timeout  65;
    types_hash_max_size  4096;
    server_tokens  off;

    include  /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log  /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Reverse proxy defaults
    proxy_http_version  1.1;
    proxy_set_header Host  $host;
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header Connection  "";

    # Catch-all: without this, nginx falls back to the first vhost in
    # conf.d/ for any unmatched Host header, leaking which apps run here.
    server {
        listen  80 default_server;
        listen  [::]:80 default_server;
        server_name  _;
        return  444;
    }
    server {
        listen  443 ssl default_server;
        listen  [::]:443 ssl default_server;
        server_name  _;
        return  444;
    }

    # Single wildcard cert, shared by every vhost below (see 05-acme.md)
    ssl_certificate      /etc/nginx/ssl/<domain>.crt;
    ssl_certificate_key  /etc/nginx/ssl/<domain>.key;

    # Plain HTTP on any real subdomain just redirects to HTTPS
    server {
        listen  80;
        listen  [::]:80;
        server_name  ~^.+\.<subdomain>\.<domain>$;
        return  301 https://$host$request_uri;
    }

    include  /etc/nginx/conf.d/*.conf;
}
